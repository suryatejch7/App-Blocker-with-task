name: habit_tracker_flutter
description: Habit Tracker Flutter application (converted from a non-Flutter frontend).
publish_to: "none"
version: 2.1.1+4

environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  provider: ^6.0.5
  shared_preferences: ^2.0.15
  intl: ^0.20.2
  go_router: ^17.0.0
  flutter_vector_icons: ^2.0.0
  uuid: ^4.5.2
  connectivity_plus: ^7.0.0
  home_widget: ^0.8.0
  path_provider: ^2.0.0
  share_plus: ^7.0.0
  file_picker: ^8.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/app-image.png
  adaptive_icon_foreground: assets/images/app-image.png
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/SpaceMono-Regular.ttf
    - assets/images/adaptive-icon.png
    - assets/images/app-image.png
    - assets/images/favicon.png
    - assets/images/icon.png
    - assets/images/partial-react-logo.png
    - assets/images/react-logo.png
    - assets/images/react-logo@2x.png
    - assets/images/react-logo@3x.png
    - assets/images/splash-image.png