org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Kotlin compiler stability on Windows:
# When the Flutter project lives on a different drive than the Pub cache
# (e.g. project on S:\, Pub cache on C:\), Kotlin incremental compilation
# can crash while closing relocatable incremental caches.
kotlin.incremental=false
kotlin.incremental.android=false
kotlin.incremental.useClasspathSnapshot=false
kotlin.compiler.execution.strategy=in-process
